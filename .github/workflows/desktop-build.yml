name: Desktop Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build:
    name: Build ${{ matrix.name }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            os: macos-15-intel
            script: package:mac:x64
            artifact: marknote-macos-intel
            patterns: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - name: macOS Apple Silicon
            os: macos-15
            script: package:mac:arm64
            artifact: marknote-macos-apple-silicon
            patterns: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - name: Windows x64
            os: windows-latest
            script: package:win:x64
            artifact: marknote-windows-x64
            patterns: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show runner environment
        shell: bash
        run: |
          node --version
          npm --version
          uname -a || true
          node -p "process.platform + ' ' + process.arch"

      - name: Build renderer and Electron main process
        run: npm run desktop:build

      - name: Package desktop app
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache

      - name: List package outputs
        if: always()
        shell: bash
        run: |
          pwd
          find release -maxdepth 3 -print || true
          find "$RUNNER_TEMP" -maxdepth 3 \( -name '*.zip' -o -name '*.dmg' -o -name '*.exe' \) -print 2>/dev/null || true

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.patterns }}
          if-no-files-found: error
          retention-days: 14
