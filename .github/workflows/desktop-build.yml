name: Desktop Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      target:
        description: Desktop target to build
        required: true
        default: all
        type: choice
        options:
          - all
          - macos
          - macos-x64
          - macos-arm64
          - windows-x64

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.12.0'
  VITE_SYNC_CONFIG_URL: ${{ vars.MARKNOTE_SYNC_CONFIG_URL }}

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build:
    name: Build ${{ matrix.name }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            target: macos-x64
            os: macos-15-intel
            script: package:mac:x64
            artifact: marknote-macos-intel
            patterns: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - name: macOS Apple Silicon
            target: macos-arm64
            os: macos-15
            script: package:mac:arm64
            artifact: marknote-macos-apple-silicon
            patterns: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - name: Windows x64
            target: windows-x64
            os: windows-latest
            script: package:win:x64
            artifact: marknote-windows-x64
            patterns: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
    runs-on: ${{ matrix.os }}
    env:
      SHOULD_BUILD: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == matrix.target || (github.event.inputs.target == 'macos' && startsWith(matrix.target, 'macos-')) }}
    steps:
      - name: Checkout
        if: env.SHOULD_BUILD == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.SHOULD_BUILD == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_BUILD == 'true'
        run: npm ci

      - name: Show runner environment
        if: env.SHOULD_BUILD == 'true'
        shell: bash
        run: |
          node --version
          npm --version
          uname -a || true
          node -p "process.platform + ' ' + process.arch"
          if [ -n "${VITE_SYNC_CONFIG_URL:-}" ]; then
            echo "Sync configuration source: configured"
          else
            echo "Sync configuration source: not configured (local-only artifact)"
          fi

      - name: Build renderer and Electron main process
        if: env.SHOULD_BUILD == 'true'
        run: npm run desktop:build

      - name: Package desktop app
        if: env.SHOULD_BUILD == 'true'
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache

      - name: List package outputs
        if: always() && env.SHOULD_BUILD == 'true'
        shell: bash
        run: |
          pwd
          find release -maxdepth 3 -print || true
          find "$RUNNER_TEMP" -maxdepth 3 \( -name '*.zip' -o -name '*.dmg' -o -name '*.exe' \) -print 2>/dev/null || true

      - name: Upload package artifacts
        if: env.SHOULD_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.patterns }}
          if-no-files-found: error
          retention-days: 30
