name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  NODE_VERSION: '22.12.0'
  VITE_SYNC_CONFIG_URL: ${{ vars.MARKNOTE_SYNC_CONFIG_URL }}
  MARKNOTE_REQUIRE_SYNC_CONFIG: '1'
  MARKNOTE_SUPABASE_AUTH_REDIRECT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/?app=1

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure Pages
        continue-on-error: true
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Verify Pages cloud sync and OAuth
        run: npm run check:google-oauth

      - name: Verify Supabase sync backend
        run: npm run check:supabase-sync

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    name: Verify deployed cloud sync
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify live Pages deployment
        env:
          MARKNOTE_PAGES_URL: ${{ needs.deploy.outputs.page_url }}?app=1
        run: npm run check:pages-deployment
